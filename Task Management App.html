<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .input-section {
            padding: 30px;
            background: #f8f9ff;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #taskInput {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #addBtn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        #addBtn:hover {
            transform: translateY(-2px);
        }

        .tasks-section {
            padding: 0 30px 30px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }

        .task-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 20px;
            margin-bottom: 10px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 15px;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
            padding: 5px 0;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #999;
            font-style: italic;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ff5252;
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 40px;
        }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Task Management App</h1>
            <p>Vazifalaringizni boshqaring</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Yangi vazifa kiriting..." maxlength="100">
                <button id="addBtn">Qo'shish</button>
            </div>
        </div>

        <div class="tasks-section">
            <div class="stats">
                <span id="totalTasks">Jami: 0</span>
                <span id="completedTasks">Bajarilgan: 0</span>
            </div>
            <div class="task-list" id="taskList">
                <div class="empty-state">
                    <p>📝 Hozircha vazifangiz yo'q</p>
                    <p>Yangi vazifa qo'shish uchun yuqoridagi maydonni to'ldiring!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        class TaskManager {
            constructor() {
                this.tasks = JSON.parse(localStorage.getItem('tasks')) || [];
                this.init();
            }

            init() {
                this.bindEvents();
                this.render();
            }

            bindEvents() {
                document.getElementById('addBtn').addEventListener('click', () => this.addTask());
                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTask();
                });
            }

            addTask() {
                const input = document.getElementById('taskInput');
                const text = input.value.trim();

                if (text) {
                    const task = {
                        id: Date.now(),
                        text: text,
                        completed: false
                    };

                    this.tasks.unshift(task);
                    input.value = '';
                    this.saveTasks();
                    this.render();
                }
            }

            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.render();
                }
            }

            deleteTask(id) {
                this.tasks = this.tasks.filter(t => t.id !== id);
                this.saveTasks();
                this.render();
            }

            saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(this.tasks));
            }

            render() {
                const taskList = document.getElementById('taskList');
                const totalSpan = document.getElementById('totalTasks');
                const completedSpan = document.getElementById('completedTasks');

                const total = this.tasks.length;
                const completed = this.tasks.filter(t => t.completed).length;

                totalSpan.textContent = `Jami: ${total}`;
                completedSpan.textContent = `Bajarilgan: ${completed}`;

                if (total === 0) {
                    taskList.innerHTML = `
                        <div class="empty-state">
                            <p>📝 Hozircha vazifangiz yo'q</p>
                            <p>Yangi vazifa qo'shish uchun yuqoridagi maydonni to'ldiring!</p>
                        </div>
                    `;
                    return;
                }

                taskList.innerHTML = this.tasks.map(task => `
                    <div class="task-item">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                               onchange="taskManager.toggleTask(${task.id})">
                        <span class="task-text ${task.completed ? 'completed' : ''}">${task.text}</span>
                        <button class="delete-btn" onclick="taskManager.deleteTask(${task.id})" title="O'chirish">×</button>
                    </div>
                `).join('');
            }
        }

        // Global taskManager instance
        const taskManager = new TaskManager();
    </script>
</body>
</html>
